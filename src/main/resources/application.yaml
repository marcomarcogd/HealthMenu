spring:
  application:
    name: HealthMenu
  profiles:
    default: local
  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML
    encoding: UTF-8
  web:
    resources:
      static-locations: classpath:/static/,classpath:/public/,file:uploads/
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB
  sql:
    init:
      encoding: UTF-8

server:
  port: ${SERVER_PORT:8080}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath:/mapper/**/*.xml

app:
  frontend-base-url: ${APP_FRONTEND_BASE_URL:http://localhost:5173}
  upload-dir: ${APP_UPLOAD_DIR:uploads}
  share:
    base-url: ${APP_SHARE_BASE_URL:http://localhost:${server.port}}
  ai-import:
    enabled: ${APP_AI_IMPORT_ENABLED:false}
    provider: ${APP_AI_IMPORT_PROVIDER:mock}
  coze:
    enabled: ${APP_COZE_ENABLED:false}
    text-import-workflow: ${APP_COZE_TEXT_IMPORT_WORKFLOW:text}
    image-workflow: ${APP_COZE_IMAGE_WORKFLOW:image}
    text-import-url: ${APP_COZE_TEXT_IMPORT_URL:}
    text-import-token: ${APP_COZE_TEXT_IMPORT_TOKEN:}
    image-url: ${APP_COZE_IMAGE_URL:}
    image-token: ${APP_COZE_IMAGE_TOKEN:}
    image-style-hint: ${APP_COZE_IMAGE_STYLE_HINT:营养师生成餐单配图，图上禁止出现任何文字，干净、柔和、真实食材质感}
