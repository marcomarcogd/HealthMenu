<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${menu != null and menu.title != null and !#strings.isEmpty(menu.title) ? menu.title : '餐单展示'}">餐单展示</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script>
        async function exportImage() {
            const button = document.getElementById('export-button')
            const loadingTip = document.getElementById('loading-tip')
            const target = document.getElementById('share-card')
            button.disabled = true
            loadingTip.style.display = 'block'
            try {
                const canvas = await html2canvas(target, {
                    scale: 4,
                    useCORS: true,
                    logging: false,
                    backgroundColor: '#ffffff',
                    scrollX: 0,
                    scrollY: 0,
                    windowWidth: target.offsetWidth,
                    windowHeight: target.offsetHeight,
                    letterRendering: true,
                    allowTaint: false
                })
                const link = document.createElement('a')
                const title = (document.getElementById('menu-title')?.innerText || '专属餐单').trim()
                const date = (document.getElementById('menu-date')?.innerText || '').trim().replace(/[\s/:]+/g, '-')
                link.download = `${title}${date ? '_' + date : ''}.png`
                link.href = canvas.toDataURL('image/png')
                link.click()
            } finally {
                button.disabled = false
                loadingTip.style.display = 'none'
            }
        }
    </script>
</head>
<body class="view-body">
<div class="share-toolbar" th:classappend="${shareMode} ? ' share-toolbar--share' : ''">
    <button class="btn-secondary" onclick="window.print()">打印</button>
    <button id="export-button" class="btn-primary" onclick="exportImage()">导出图片</button>
</div>
<div class="loading-tip" id="loading-tip">正在导出餐单图片，请稍候...</div>

<div class="menu-manual-card" id="share-card">
    <div class="menu-manual-logo">康服团</div>
    <div class="menu-manual-title" id="menu-title" th:text="${menu != null and menu.title != null and !#strings.isEmpty(menu.title) ? menu.title : '专属餐单'}"></div>

    <div class="menu-manual-section" th:if="${menuForm != null and menuForm.showSwapGuide}">
        <div class="menu-manual-section-title">核心食物互换速查指南</div>
        <th:block th:each="section : ${menuForm.sections}">
            <div th:if="${section.sectionType == 'SWAP_GUIDE'}" class="menu-manual-section-body">
                <div class="menu-manual-section-content"
                     th:style="'color:' + ${section.color} + ';font-weight:' + (${section.bold} ? '700' : '400')"
                     th:text="${section.content != null and !#strings.isEmpty(section.content) ? section.content : '暂无指南'}"></div>
                <img th:if="${section.imagePath != null and !#strings.isEmpty(section.imagePath)}"
                     class="menu-manual-image"
                     th:src="${section.imagePath}"
                     alt="section image">
            </div>
        </th:block>
    </div>

    <div class="menu-manual-section" th:if="${menuForm != null and menuForm.showWeeklyTip}">
        <div class="menu-manual-section-title">每周提示</div>
        <th:block th:each="section : ${menuForm.sections}">
            <div th:if="${section.sectionType == 'WEEKLY_TIP'}" class="menu-manual-section-body">
                <div class="menu-manual-section-content"
                     th:style="'color:' + ${section.color} + ';font-weight:' + (${section.bold} ? '700' : '400')"
                     th:text="${section.content != null and !#strings.isEmpty(section.content) ? section.content : '暂无每周提示'}"></div>
                <img th:if="${section.imagePath != null and !#strings.isEmpty(section.imagePath)}"
                     class="menu-manual-image"
                     th:src="${section.imagePath}"
                     alt="section image">
            </div>
        </th:block>
    </div>

    <th:block th:if="${menuForm != null}">
        <div class="menu-manual-section"
             th:each="section : ${menuForm.sections}"
             th:if="${section.sectionType != 'SWAP_GUIDE' and section.sectionType != 'WEEKLY_TIP' and section.sectionType != 'EXCLUSIVE_TITLE' and section.sectionType != 'DAILY_MENU'}">
            <div class="menu-manual-section-title" th:text="${section.title}"></div>
            <div class="menu-manual-section-content"
                 th:style="'color:' + ${section.color} + ';font-weight:' + (${section.bold} ? '700' : '400')"
                 th:text="${section.content}"></div>
            <img th:if="${section.imagePath != null and !#strings.isEmpty(section.imagePath)}"
                 class="menu-manual-image"
                 th:src="${section.imagePath}"
                 alt="section image">
        </div>
    </th:block>

    <div class="menu-manual-date" id="menu-date" th:text="${menu != null and menu.menuDate != null ? menu.menuDate : ''}"></div>

    <th:block th:if="${menuForm != null}">
        <div class="menu-manual-meal" th:each="meal : ${menuForm.meals}">
            <div class="menu-manual-meal-side">
                <div class="menu-manual-meal-name" th:text="${meal.mealName}"></div>
                <div class="menu-manual-meal-time" th:text="${meal.mealTime != null and !#strings.isEmpty(meal.mealTime) ? meal.mealTime : meal.timeLabel}"></div>
            </div>
            <div class="menu-manual-meal-main">
                <div class="menu-manual-meal-row" th:each="item : ${meal.items}">
                    <div class="menu-manual-meal-label" th:text="${item.itemName + '：'}"></div>
                    <div class="menu-manual-meal-value-group">
                        <div class="menu-manual-meal-value"
                             th:style="'color:' + ${item.color} + ';font-weight:' + (${item.bold} ? '700' : '400')"
                             th:text="${item.itemValue != null and !#strings.isEmpty(item.itemValue) ? item.itemValue : '-'}"></div>
                        <img th:if="${item.imagePath != null and !#strings.isEmpty(item.imagePath)}"
                             class="menu-manual-item-image"
                             th:src="${item.imagePath}"
                             alt="meal item image">
                    </div>
                </div>
            </div>
        </div>
    </th:block>
</div>
</body>
</html>
