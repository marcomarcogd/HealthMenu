spring:
  datasource:
    url: jdbc:h2:mem:healthmenu-test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  sql:
    init:
      mode: always
      encoding: UTF-8
      schema-locations: classpath:/sql/schema-h2.sql
      data-locations: classpath:/sql/data.sql
  jackson:
    time-zone: Asia/Shanghai

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath:/mapper/**/*.xml

app:
  upload-dir: uploads-test
  share:
    base-url: http://localhost:8001
  ai-import:
    enabled: false
    provider: mock
  coze:
    enabled: false
    text-import-workflow: text
    image-workflow: image
    text-import-url: http://localhost/mock
    text-import-token: test-token
    image-url: http://localhost/mock-image
    image-token: test-token
    image-style-hint: test
